function hdrs(token) {
  return {
    "apikey": ANON,
    "Authorization": `Bearer ${token || ANON}`,
    "Content-Type": "application/json",
    "Prefer": "return=representation",
  };
}

async function api(method, path, body, token) {
  const res = await fetch(`${URL_}${path}`, {
    method, headers: hdrs(token), body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const txt = await res.text();
    let msg = txt;
    try { msg = JSON.parse(txt).message || JSON.parse(txt).error_description || txt; } catch {}
    throw new Error(msg);
  }
  const t = await res.text();
  return t ? JSON.parse(t) : [];
}

const authLogin  = (e, p)      => api("POST", "/auth/v1/token?grant_type=password", { email:e, password:p });
const authSignup = (e, p)      => api("POST", "/auth/v1/signup", { email:e, password:p });
const authLogout = (tk)        => api("POST", "/auth/v1/logout", {}, tk);
const dbGet      = (t, p, tk)  => api("GET",    `/rest/v1/${t}${p}`, null, tk);
const dbPost     = (t, b, tk)  => api("POST",   `/rest/v1/${t}`, b, tk);
const dbPatch    = (t, id, b, tk) => api("PATCH", `/rest/v1/${t}?id=eq.${id}`, b, tk);
const dbDel      = (t, p, tk)  => api("DELETE", `/rest/v1/${t}${p}`, null, tk);

  textarea:{ width:"100%", background:"#F0F8FF", border:`1.5px solid ${C.border}`, borderRadius:12, padding:"12px 14px", fontSize:15, color:C.text, outline:"none", minHeight:80, resize:"vertical", display:"block" },
  modal:   { position:"fixed", inset:0, background:"rgba(10,30,60,.45)", zIndex:100, display:"flex", alignItems:"flex-end", justifyContent:"center" },

const EMOJIS = ["🙏","✨","🌿","🕊️","💛","🌸","🌻","🦋","🌙","⭐","🫶","💫"];

function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (m < 1) return "agora";
  if (m < 60) return `${m}min atrás`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h atrás`;
  return `${Math.floor(h/24)}d atrás`;
}

function Spinner() {
  return <div style={{ width:18, height:18, border:"2px solid rgba(255,255,255,.3)", borderTop:"2px solid #fff", borderRadius:"50%", animation:"spin .7s linear infinite", display:"inline-block", verticalAlign:"middle" }}/>;
}

// ── TELA AUTH ────────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [tab,   setTab]   = useState("login");
  const [email, setEmail] = useState("");
  const [pw,    setPw]    = useState("");
  const [name,  setName]  = useState("");
  const [emoji, setEmoji] = useState("🙏");
  const [busy,  setBusy]  = useState(false);
  const [err,   setErr]   = useState("");

  async function doLogin() {
    if (!email || !pw) { setErr("Preencha e-mail e senha."); return; }
    setBusy(true); setErr("");
    try {
      const data = await authLogin(email, pw);
      if (!data.access_token) throw new Error("Resposta inválida do servidor.");
      const members = await dbGet("pgm_members", `?user_id=eq.${data.user.id}&select=*`, data.access_token);
      onAuth({ token: data.access_token, user: data.user, member: members[0] || null });
    } catch (e) {
      setErr("E-mail ou senha incorretos. Verifique e tente novamente.");
    }
    setBusy(false);
  }

  async function doSignup() {
    if (!email || !pw || !name.trim()) { setErr("Preencha todos os campos."); return; }
    if (pw.length < 6) { setErr("A senha deve ter ao menos 6 caracteres."); return; }
    setBusy(true); setErr("");
    try {
      const data = await authSignup(email, pw);
      if (!data.access_token) {
        setErr("✅ Cadastro enviado! Confirme seu e-mail e depois faça login.");
        setBusy(false); return;
      }
      const [member] = await dbPost("pgm_members", { name: name.trim(), emoji, user_id: data.user.id }, data.access_token);
      onAuth({ token: data.access_token, user: data.user, member });
    } catch (e) {
      if (e.message.includes("already registered")) setErr("E-mail já cadastrado. Faça login.");
      else setErr(`Erro: ${e.message}`);
    }
    setBusy(false);
  }

  return (
    <div style={{ ...s.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 16px" }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:52 }}>🕊️</div>
          <h1 style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:26, color:C.text, fontWeight:700, marginTop:8 }}>PGM</h1>
          <p style={{ color:C.muted, fontSize:14, marginTop:4 }}>Pedidos de Oração</p>
        </div>
        <div style={{ ...s.card, padding:"24px 20px 28px" }}>
          <div style={{ display:"flex", borderBottom:`1px solid ${C.border}`, marginBottom:20 }}>
            <button style={{ ...s.tab, ...(tab==="login"  ? s.tabAct : {}) }} onClick={() => { setTab("login");  setErr(""); }}>Entrar</button>
            <button style={{ ...s.tab, ...(tab==="signup" ? s.tabAct : {}) }} onClick={() => { setTab("signup"); setErr(""); }}>Cadastrar</button>
          </div>
          {err && <div style={s.errBox}>{err}</div>}
          {tab === "signup" && <>
            <span style={{ ...s.label, marginBottom:8 }}>Seu emoji no grupo</span>
            <div style={s.emojiGrid}>
              {EMOJIS.map(e => (
                <button key={e} onClick={() => setEmoji(e)} style={{ fontSize:22, background:emoji===e?"#E0F0FF":C.blueLight, border:`2px solid ${emoji===e?C.blue:"transparent"}`, borderRadius:12, padding:"6px 0", cursor:"pointer" }}>{e}</button>
              ))}
            </div>
            <input style={s.input} placeholder="Seu nome no grupo..." value={name} onChange={e => setName(e.target.value)}/>
          </>}
          <input style={s.input} placeholder="E-mail..." type="email" value={email} onChange={e => setEmail(e.target.value)}/>
          <input style={s.input} placeholder="Senha (mín. 6 caracteres)..." type="password" value={pw}
            onChange={e => setPw(e.target.value)}
            onKeyDown={e => e.key==="Enter" && (tab==="login" ? doLogin() : doSignup())}/>
          <button className="btn-press" style={{ ...s.btn, opacity:busy?.8:1 }} onClick={tab==="login" ? doLogin : doSignup}>
            {busy ? <Spinner/> : (tab==="login" ? "Entrar" : "Criar conta")}
          </button>
        </div>
        <p style={{ textAlign:"center", color:C.muted, fontSize:12, marginTop:16 }}>Acesso restrito ao grupo 🔒</p>
      </div>
    </div>
  );
}

// ── COMPLETAR PERFIL (caso membro não exista) ────────────────────────────────
function ProfileSetup({ session, onDone, onLogout }) {
  const [name,  setName]  = useState("");
  const [emoji, setEmoji] = useState("🙏");
  const [busy,  setBusy]  = useState(false);
  const [err,   setErr]   = useState("");

  async function save() {
    if (!name.trim()) { setErr("Digite seu nome."); return; }
    setBusy(true); setErr("");
    try {
      const [member] = await dbPost("pgm_members",
        { name: name.trim(), emoji, user_id: session.user.id },
        session.token
      );
      onDone(member);
    } catch (e) {
      setErr(`Erro: ${e.message}`);
    }
    setBusy(false);
  }

  return (
    <div style={{ ...s.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 16px" }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:44 }}>👤</div>
          <h2 style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:22, color:C.text, marginTop:8 }}>Complete seu perfil</h2>
          <p style={{ color:C.muted, fontSize:13, marginTop:6 }}>Escolha como você vai aparecer no grupo</p>
        </div>
        <div style={{ ...s.card, padding:"24px 20px" }}>
          {err && <div style={s.errBox}>{err}</div>}
          <span style={{ ...s.label, marginBottom:8 }}>Seu emoji</span>
          <div style={s.emojiGrid}>
            {EMOJIS.map(e => (
              <button key={e} onClick={() => setEmoji(e)} style={{ fontSize:22, background:emoji===e?"#E0F0FF":C.blueLight, border:`2px solid ${emoji===e?C.blue:"transparent"}`, borderRadius:12, padding:"6px 0", cursor:"pointer" }}>{e}</button>
            ))}
          </div>
          <input style={s.input} placeholder="Seu nome no grupo..." value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key==="Enter" && save()}/>
          <button className="btn-press" style={{ ...s.btn, opacity:busy?.8:1 }} onClick={save}>
            {busy ? <Spinner/> : "Salvar perfil"}
          </button>
          <button onClick={onLogout} style={{ ...s.ghost, width:"100%", marginTop:10, textAlign:"center" }}>Sair</button>
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ────────────────────────────────────────────────────────────
function AppMain({ session, onLogout }) {
  const { token, member: me } = session;

  const [members,  setMembers]  = useState([]);
  const [requests, setRequests] = useState([]);
  const [intercs,  setIntercs]  = useState([]);
  const [modal,    setModal]    = useState(null);
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [filter,   setFilter]   = useState("all");
  const [reqTitle, setReqTitle] = useState("");
  const [reqBody,  setReqBody]  = useState("");
  const [error,    setError]    = useState(null);

  const fetchAll = useCallback(async () => {
    try {
      const [m, r, i] = await Promise.all([
        dbGet("pgm_members",       "?order=joined_at.asc&select=*",  token),
        dbGet("pgm_requests",      "?order=created_at.desc&select=*", token),
        dbGet("pgm_intercessions", "?select=*",                       token),
      ]);
      setMembers(m); setRequests(r); setIntercs(i); setError(null);
    } catch(e) {
      if (e.message.includes("JWT") || e.message.includes("expired") || e.message.includes("invalid claim")) {
        // Sessão expirada — limpar e voltar ao login
        try { localStorage.removeItem("pgm_session"); } catch {}
        onLogout();
        return;
      }
      setError(`Erro ao carregar: ${e.message}`);
    } finally { setLoading(false); }
  }, [token, onLogout]);

  useEffect(() => { fetchAll(); }, []);
  useEffect(() => { const t = setInterval(fetchAll, 30000); return () => clearInterval(t); }, []);

  async function addRequest() {
    if (!reqTitle.trim()) return;
    if (!me?.id) { setError("Perfil não encontrado. Saia e entre novamente."); return; }
    setSaving(true); setError(null);
    try {
      const [r] = await dbPost("pgm_requests",
        { member_id: me.id, title: reqTitle.trim(), body: reqBody.trim() || null }, token);
      setRequests(p => [r, ...p]);
      setReqTitle(""); setReqBody(""); setModal(null);
    } catch(e) {
      setError(`Erro ao salvar pedido: ${e.message}`);
    }
    setSaving(false);
  }

  async function togglePray(requestId) {
    if (!me?.id) return;
    const existing = intercs.find(i => i.request_id===requestId && i.member_id===me.id);
    try {
      if (existing) {
        setIntercs(p => p.filter(i => i.id!==existing.id));
        await dbDel("pgm_intercessions", `?id=eq.${existing.id}`, token);
      } else {
        const [i] = await dbPost("pgm_intercessions", { request_id:requestId, member_id:me.id }, token);
        setIntercs(p => [...p, i]);
      }
    } catch(e) { setError(`Erro: ${e.message}`); }
  }

  async function toggleAnswered(req) {
    const val = { answered: !req.answered };
    setRequests(p => p.map(r => r.id===req.id ? { ...r, ...val } : r));
    try { await dbPatch("pgm_requests", req.id, val, token); }
    catch(e) { setError(`Erro: ${e.message}`); fetchAll(); }
  }

  async function deleteRequest(id) {
    setRequests(p => p.filter(r => r.id!==id));
    setIntercs(p => p.filter(i => i.request_id!==id));
    try { await dbDel("pgm_requests", `?id=eq.${id}`, token); }
    catch(e) { setError(`Erro: ${e.message}`); fetchAll(); }
  }

  const member   = id => members.find(m => m.id===id);
  const filtered = requests.filter(r =>
    filter==="mine"     ? r.member_id===me?.id :
    filter==="answered" ? r.answered :
    filter==="pending"  ? !r.answered : true
  );

  if (loading) return (
    <div style={{ ...s.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12 }}>
      <div style={{ fontSize:48 }}>🕊️</div>
      <p style={{ color:C.muted, fontSize:14 }}>Carregando...</p>
    </div>
  );

  return (
    <div style={s.app}>
      <div style={s.header}>
        <p style={s.htitle}>🕊️ PGM - Pedidos de Oração</p>
        <p style={s.hsub}>{members.length} membros · {requests.filter(r=>!r.answered).length} pedidos ativos · {intercs.length} intercesões</p>
        {me && (
          <div style={{ marginTop:10, display:"inline-flex", alignItems:"center", gap:8, background:"rgba(255,255,255,0.12)", borderRadius:40, padding:"5px 14px 5px 10px" }}>
            <span style={{ fontSize:17 }}>{me.emoji}</span>
            <span style={{ fontSize:13, fontWeight:600 }}>{me.name}</span>
            <button onClick={onLogout} style={{ background:"transparent", border:"1px solid rgba(255,255,255,.3)", color:"#fff", opacity:.8, cursor:"pointer", fontSize:12, padding:"2px 8px", marginLeft:6, borderRadius:20, fontFamily:"inherit" }}>Sair</button>
          </div>
        )}
      </div>

      {error && (
        <div style={{ ...s.errBox, margin:"12px 16px 0" }}>
          ⚠️ {error}
          <button onClick={() => setError(null)} style={{ float:"right", background:"none", border:"none", cursor:"pointer", color:C.error, fontSize:16 }}>×</button>
        </div>
      )}

      <div style={s.section}>
        <span style={s.label}>👥 Membros do grupo</span>
        <div style={{ display:"flex", flexWrap:"wrap" }}>
          {members.map(m => (
            <div key={m.id} style={{ ...s.chip, cursor:"default", ...(m.id===me?.id ? { background:"linear-gradient(135deg,#3A86C8,#6DB3E8)", color:"#fff", border:"1.5px solid #3A86C8" } : {}) }}>
              <span style={{ fontSize:18 }}>{m.emoji}</span>
              <span>{m.name}{m.id===me?.id ? " (você)" : ""}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ ...s.section, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8, paddingTop:14 }}>
        <div style={{ display:"flex", gap:6 }}>
          {[["all","Todos"],["pending","Em espera"],["mine","Meus"],["answered","Respondidos"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)}
              style={{ ...s.ghost, ...(filter===v ? { background:C.blueLight, borderColor:C.blue, color:C.text } : {}) }}>
              {l}
            </button>
          ))}
        </div>
        <button className="btn-press" style={s.btnSm} onClick={() => setModal("request")}>+ Novo pedido</button>
      </div>

      <div style={{ ...s.section, paddingTop:14 }}>
        {filtered.length===0 && (
          <p style={{ textAlign:"center", color:C.muted, padding:"28px 0", fontStyle:"italic", fontSize:14 }}>Nenhum pedido aqui ainda. 💛</p>
        )}
        {filtered.map(req => {
          const author  = member(req.member_id);
          const reqI    = intercs.filter(i => i.request_id===req.id);
          const iPrayed = reqI.some(i => i.member_id===me?.id);
          const isOwner = me?.id===req.member_id;
          return (
            <div key={req.id} className="fade"
              style={{ ...s.card, ...(req.answered ? { borderColor:C.answered, background:C.answeredBg } : {}) }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                    <span style={{ fontSize:19 }}>{author?.emoji||"🙏"}</span>
                    <span style={{ fontWeight:700, fontSize:15 }}>{req.title}</span>
                  </div>
                  <div style={{ fontSize:12, color:C.muted }}>{author?.name} · {timeAgo(req.created_at)}</div>
                  {req.body && <p style={{ marginTop:8, fontSize:14, lineHeight:1.65 }}>{req.body}</p>}
                </div>
                {req.answered && <span style={s.answTag}>✅ Respondida</span>}
              </div>
              <hr style={s.divider}/>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <button onClick={() => togglePray(req.id)}
                  style={{ ...s.ghost, ...(iPrayed ? { background:"#E0F0FF", borderColor:C.blue, color:"#1A5C8A" } : {}) }}>
                  🙏 {iPrayed ? "Orei por isso" : "Orar por isso"}
                </button>
                {reqI.length>0 && (
                  <span style={{ fontSize:13, color:C.muted, fontStyle:"italic" }}>
                    {reqI.length} {reqI.length===1?"pessoa orou":"pessoas oraram"}
                    <span style={{ marginLeft:5 }}>{reqI.slice(0,5).map(i=>member(i.member_id)?.emoji).filter(Boolean).join("")}</span>
                  </span>
                )}
                {isOwner && <>
                  <button style={s.answBtn} onClick={() => toggleAnswered(req)}>
                    {req.answered ? "↩ Desfazer" : "✅ Respondida!"}
                  </button>
                  <button onClick={() => deleteRequest(req.id)}
                    style={{ ...s.ghost, color:C.error, borderColor:"#F1B0A8" }}>🗑</button>
                </>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center", padding:"16px 0 0" }}>
        <button style={s.ghost} onClick={fetchAll}>↻ Atualizar</button>
      </div>

      {modal==="request" && (
        <div style={s.modal} onClick={e => e.target===e.currentTarget && setModal(null)}>
          <div style={s.modalBox}>
            <span style={s.mTitle}>Novo pedido de oração 🙏</span>
            <input style={s.input} placeholder="Título do pedido..." value={reqTitle} onChange={e => setReqTitle(e.target.value)}/>
            <textarea style={s.textarea} placeholder="Detalhes (opcional)..." value={reqBody} onChange={e => setReqBody(e.target.value)}/>
            <div style={{ display:"flex", gap:10, marginTop:10 }}>
              <button className="btn-press" style={{ ...s.btnSm, flex:1, opacity:saving?.8:1 }} onClick={addRequest}>
                {saving ? <Spinner/> : "Compartilhar"}
              </button>
              <button style={s.ghost} onClick={() => setModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [booting, setBooting] = useState(true);

  useEffect(() => {
    try {
      const saved = localStorage.getItem("pgm_session");
      if (saved) setSession(JSON.parse(saved));
    } catch {}
    setBooting(false);
  }, []);

  function handleAuth(sess) {
    setSession(sess);
    try { localStorage.setItem("pgm_session", JSON.stringify(sess)); } catch {}
  }

  function handleProfileDone(member) {
    const updated = { ...session, member };
    setSession(updated);
    try { localStorage.setItem("pgm_session", JSON.stringify(updated)); } catch {}
  }

  async function handleLogout() {
    try { await authLogout(session?.token); } catch {}
    setSession(null);
    try { localStorage.removeItem("pgm_session"); } catch {}
  }

  if (booting) return (
    <div style={{ ...s.app, display:"flex", alignItems:"center", justifyContent:"center", fontSize:48 }}>🕊️</div>
  );

  if (!session) return <AuthScreen onAuth={handleAuth}/>;

  // Logado mas sem perfil: pede para completar
  if (!session.member) return <ProfileSetup session={session} onDone={handleProfileDone} onLogout={handleLogout}/>;

  return <AppMain session={session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
